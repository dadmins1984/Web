title: "CyberSecurity Startup"
description: "We provide training, implementation, and reviews for cybersecurity solutions."

theme: jekyll-theme-minimal # Możesz zmienić na "cayman" lub inny, w zależności od preferencji
markdown: kramdown

sass:
  sass_dir: assets/css
  style: compressed

include:
  - _posts
  - assets # Upewnij się, że zasoby CSS i obrazy są brane pod uwagę

permalinks:
  post: "/:year/:month/:day/:slug"
  page: "/:slug/"


url: "https://dadmins1984.github.io/Web/"  # Zmien na swoja URL (twoje repozytorium GitHub Pages)
repository: "dadmins1984/Web"  # Zmien na twoje repozytorium GitHub
