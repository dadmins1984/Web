# Strona podstawowa
title: CyberSecurity Co.
description: "Firma specjalizująca się w usługach cyberbezpieczeństwa. Oferujemy audyty, szkolenia, oraz wdrożenia rozwiązań ochrony danych."
url: "https://dadmins1984.github.io/Web"  # Zmień na swoją domenę
baseurl: ""  # Zostaw pusty, chyba że masz subfolder, np. "/moja-strona"
lang: pl
timezone: "Europe/Warsaw"

# Ustawienia Jekyll
markdown: kramdown  # Silnik do renderowania Markdown
theme: jekyll-theme-slate  # Możesz zmienić na preferowany motyw

# Ustawienia do rozwoju
paginate: 5  # Liczba postów na stronę (jeśli masz bloga)

# Spersonalizowane zmienne
social_links:
  twitter: "https://twitter.com/twoja_firma"
  linkedin: "https://linkedin.com/company/twoja_firma"
  facebook: "https://facebook.com/twoja_firma"
  instagram: "https://instagram.com/twoja_firma"

# Ustawienia wtyczek (opcjonalne, zależne od używanych wtyczek)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Ustawienia faviconu i logo
favicon: /assets/images/favicon.ico
logo: /assets/images/logo.png

# Parametry SEO
seo:
  title: "CyberSecurity Co. - Zabezpieczamy Twoje dane"
  description: "Oferujemy usługi ochrony danych, audyty i szkolenia w zakresie cyberbezpieczeństwa."
  twitter_card: summary_large_image

# Strona domowa
defaults:
  - scope:
      path: ""
    values:
      layout: "default"  # Layout dla wszystkich stron
      author: "CyberSecurity Co."
      sidebar: false  # Jeśli chcesz sidebar, zmień na true

# Strona kontaktowa
contact:
  email: kontakt@twojadomena.com
  phone: "+48 123 456 789"
  address: "ul. Bezpieczna 1, 00-000 Warszawa"

# Wtyczki i inne dodatki
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

# Kultura kodu: dodaj linki, stylizacje do innych plików (np. animacje, obrazy)
assets:
  css:
    - /assets/css/style.css
  js:
    - /assets/js/main.js
  images:
    - /assets/images/header-bg.jpg
